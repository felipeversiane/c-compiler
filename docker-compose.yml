name: c-compiler

services:
  test:
    build:
      context: .
      target: builder
    volumes:
      - .:/app
    command: >
      sh -c "
        chmod +x scripts/run_all_tests.sh &&
        ./scripts/run_all_tests.sh
      "

  dev:
    build:
      context: .
      target: builder
    volumes:
      - .:/app
    command: tail -f /dev/null